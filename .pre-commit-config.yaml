repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Reason: must track the ruff version in pyproject.toml's dev group.
    # Ruff 0.9 changed assert-message formatting, so an older hook reformats
    # files that CI's newer `ruff format --check` then rejects.
    rev: v0.13.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: add-copyright-notice
        name: Add copyright notice to Python files
        entry: python scripts/add_copyright_notice.py
        language: system
        files: \.py$
        exclude: ^(tests/|examples/)
        pass_filenames: true
      - id: check-file-length
        name: Check file length (max 500 lines)
        entry: python scripts/check_file_length.py
        language: system
        files: \.py$
        exclude: ^tests/
        pass_filenames: true
      - id: check-no-emojis
        name: Check no emojis in files
        entry: python scripts/check_no_emojis.py
        language: system
        pass_filenames: true